
<style>
@keyframes twinkle{0%,100%{opacity:0.2;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,2s) ease-in-out infinite;}
.seg{background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.18);border-radius:16px;padding:1.2rem 0.5rem 0.9rem;position:relative;overflow:hidden;}
.seg::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);}
.num{font-size:42px;font-weight:500;color:#fff;line-height:1;font-variant-numeric:tabular-nums;}
.lbl{font-size:11px;color:rgba(255,255,255,0.55);margin-top:6px;letter-spacing:0.08em;}
.player-wrap{background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.15);border-radius:12px;overflow:hidden;margin-top:1.2rem;}
.player-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid rgba(255,255,255,0.1);}
.note{font-size:16px;}
.track-info{flex:1;min-width:0;}
.track-name{font-size:12px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.track-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:1px;}
</style>

<div style="position:relative;border-radius:20px;overflow:hidden;padding:2.5rem 1.5rem 1.5rem;background:linear-gradient(135deg,#0f0c29 0%,#302b63 45%,#24243e 100%);min-height:300px;">
  <div id="stars"></div>

  <div style="position:relative;z-index:2;text-align:center;">
    <p style="font-size:12px;color:rgba(255,255,255,0.45);margin:0 0 4px;letter-spacing:0.12em;text-transform:uppercase;">นับถอยหลังสู่</p>
    <h1 style="font-size:20px;font-weight:500;color:#fff;margin:0 0 0.2rem;">31 ธันวาคม 2570</h1>
    <p style="font-size:12px;color:rgba(255,255,255,0.35);margin:0 0 1.8rem;" id="dateSub">—</p>

    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.8rem;">
      <div class="seg"><div class="num" id="days">--</div><div class="lbl">วัน</div></div>
      <div class="seg"><div class="num" id="hours">--</div><div class="lbl">ชั่วโมง</div></div>
      <div class="seg"><div class="num" id="mins">--</div><div class="lbl">นาที</div></div>
      <div class="seg"><div class="num" id="secs">--</div><div class="lbl">วินาที</div></div>
    </div>

    <div style="margin-bottom:1rem;">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:6px;">
        <span>ความคืบหน้า</span><span id="pct">—</span>
      </div>
      <div style="background:rgba(255,255,255,0.1);border-radius:99px;height:5px;overflow:hidden;">
        <div id="bar" style="height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#a78bfa,#60a5fa);transition:width 1s linear;"></div>
      </div>
    </div>

    <div class="player-wrap">
      <div class="player-bar">
        <span class="note" aria-hidden="true">🎵</span>
        <div class="track-info">
          <div class="track-name">THhjjnsgFlE</div>
          <div class="track-sub">YouTube Music · กด ▶ เพื่อเล่น</div>
        </div>
      </div>
      <div style="position:relative;padding-bottom:56.25%;height:0;">
        <iframe id="yt"
          src="https://www.youtube.com/embed/THhjjnsgFlE?autoplay=0&rel=0&modestbranding=1&color=white"
          style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;"
          allow="autoplay; encrypted-media"
          allowfullscreen
          title="Music player">
        </iframe>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const starsEl=document.getElementById('stars');
  for(let i=0;i<55;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2.5+0.8;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s;opacity:${(Math.random()*0.5+0.1).toFixed(2)}`;
    starsEl.appendChild(s);
  }

  const target=new Date('2027-12-31T23:59:59+07:00').getTime();
  const startTs=new Date('2026-05-20T00:00:00+07:00').getTime();
  const dEl=document.getElementById('days'),hEl=document.getElementById('hours'),mEl=document.getElementById('mins'),sEl=document.getElementById('secs');
  const barEl=document.getElementById('bar'),pctEl=document.getElementById('pct'),subEl=document.getElementById('dateSub');

  function pad(n){return String(n).padStart(2,'0');}
  function tick(){
    const now=Date.now(),diff=target-now;
    if(diff<=0){dEl.textContent='0';hEl.textContent='00';mEl.textContent='00';sEl.textContent='00';barEl.style.width='100%';pctEl.textContent='100%';return;}
    const ts=Math.floor(diff/1000);
    dEl.textContent=Math.floor(ts/86400);
    hEl.textContent=pad(Math.floor((ts%86400)/3600));
    mEl.textContent=pad(Math.floor((ts%3600)/60));
    sEl.textContent=pad(ts%60);
    const pct=Math.min(100,((now-startTs)/(target-startTs)*100));
    barEl.style.width=pct.toFixed(3)+'%';
    pctEl.textContent=pct.toFixed(2)+'%';
    try{subEl.textContent=new Date(now).toLocaleString('th-TH',{timeZone:'Asia/Bangkok',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});}catch(e){}
  }
  tick();setInterval(tick,1000);
})();
</script>
